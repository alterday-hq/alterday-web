<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>alterday-web</title>
  </head>
  <body>
    <script>
      // Apply saved theme class before React mounts to prevent FOUC.
      // Mirrors the Zustand persist key "alterday-theme"; default is dark.
      (function () {
        try {
          var s = JSON.parse(localStorage.getItem('alterday-theme'));
          var dark = s ? s.state.isDark : true;
        } catch (e) {
          var dark = true;
        }
        if (dark) document.documentElement.classList.add('dark');
      })();
    </script>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
